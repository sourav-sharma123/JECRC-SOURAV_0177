<div class="container">

  <h2>🎓 Student Result Status</h2>

  <div *ngFor="let student of students" class="card">

    <h3>{{student.name}}</h3>

    <p [appStatusColor]="student.marks">
      Marks: {{student.marks}}
    </p>

    <p>
      Status: {{ student.marks >= 50 ? 'Pass' : 'Fail' }}
    </p>

  </div>

</div>
