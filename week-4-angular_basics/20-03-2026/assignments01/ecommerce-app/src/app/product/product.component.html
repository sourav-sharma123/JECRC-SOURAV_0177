<div class="container">
  <h2>🛍 Products</h2>

  <div class="grid">
    <div class="card" *ngFor="let p of products">

      <img [src]="p.image" />

      <h3>{{p.name}}</h3>
      <p class="price">₹{{p.price}}</p>
      <p>⭐ {{p.rating}}</p>

      <input type="number" [(ngModel)]="p.qty" min="1">

      <button (click)="addToCart(p)">Add to Cart</button>

    </div>
  </div>
</div>
