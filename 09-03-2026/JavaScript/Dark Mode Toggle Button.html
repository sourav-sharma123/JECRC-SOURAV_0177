<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:white;
    color:black;
    transition:0.3s;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* Dark Mode Style */

.dark{
    background:black;
    color:white;
}

</style>

</head>

<body>

<h1>Dark Mode Toggle Example</h1>

<p>Click the button to switch between Light Mode and Dark Mode.</p>

<button id="darkMode">Toggle Dark Mode</button>

<script>

/* Arrow Function */

document.getElementById("darkMode").addEventListener("click", () => {

    document.body.classList.toggle("dark");

});

</script>

</body>
</html>
