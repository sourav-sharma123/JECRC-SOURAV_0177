<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Arrow Functions Demo</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
    background:#f4f6f8;
}

h1{
    color:#333;
}

button{
    padding:10px 20px;
    font-size:16px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result-box{
    margin-top:20px;
    padding:15px;
    background:white;
    border-radius:6px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

ul{
    margin-top:10px;
}
</style>

</head>

<body>

<h1>JavaScript Arrow Functions and Arrow Methods</h1>

<p>Click the button to run the different functions</p>

<button id="runBtn">Run JavaScript Button</button>

<div class="result-box">
    <h3>Results</h3>
    <ul id="output"></ul>
</div>

<script>

const numbers = [1,2,3,4,5];

const people = [
    {name:'Alice', age:25},
    {name:'Bob', age:30},
    {name:'Charlie', age:35}
];

const runBtn = document.getElementById('runBtn');
const output = document.getElementById('output');

const squaredNumbers = numbers.map(num => num * num);

const adults = people.filter(person => person.age >= 30);

const totalAge = people.reduce((sum, person) => sum + person.age, 0);

runBtn.addEventListener('click', () => {

    output.innerHTML = '';

    const squaredList = document.createElement('li');
    squaredList.textContent = 'Squared Numbers: ' + squaredNumbers.join(', ');
    output.appendChild(squaredList);

    const adultsList = document.createElement('li');
    adultsList.textContent = 'Adults: ' + adults.map(person => person.name).join(', ');
    output.appendChild(adultsList);

    const totalAgeList = document.createElement('li');
    totalAgeList.textContent = 'Total Age: ' + totalAge;
    output.appendChild(totalAgeList);

});

</script>

</body>
</html>
