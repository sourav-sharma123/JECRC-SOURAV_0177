<div class="container">
  <h1>{{ title }}</h1>

  <div class="controls">
    <div class="filter-section">
      <label for="category">Category:</label>
      <select id="category" [(ngModel)]="selectedCategory">
        <option value="">-- Select Category --</option>
        <option *ngFor="let category of categories" [value]="category">
          {{ category }}
        </option>
      </select>

      <button (click)="filterProducts()">Filter</button>
    </div>

    <div class="stock-section">
      <label>
        <input
          type="checkbox"
          [(ngModel)]="showInStockOnly"
          (change)="onStockToggle()"
        />
        Show In-Stock Only
      </label>
    </div>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th class="sortable" (click)="sortByPrice()">Price ($)</th>
        <th>Stock</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let product of displayedProducts">
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.stock }}</td>
        <td>
          <span [class.in-stock]="product.stock > 0" [class.out-of-stock]="product.stock === 0">
            {{ product.stock > 0 ? 'In Stock' : 'Out of Stock' }}
          </span>
        </td>
      </tr>

      <tr *ngIf="displayedProducts.length === 0">
        <td colspan="6" class="no-data">No products found</td>
      </tr>
    </tbody>
  </table>
</div>
