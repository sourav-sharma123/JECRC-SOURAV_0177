<!DOCTYPE html>
<html>
<head>
    <title>Secure Banking App</title>
</head>
<body>

    <h2>Secure Banking Application</h2>
    <p>Right click is disabled for security reasons.</p>

    <script>
        // Wait until page fully loads
        window.onload = function () {

            // Disable right click everywhere
            window.addEventListener("contextmenu", function (e) {
                e.preventDefault();
                console.warn("Right click disabled for security");
                return false;
            });

        };
    </script>

</body>
</html>
