<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Support Chat</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
}

#chatIcon{
    display: inline-block;
    padding: 12px 20px;
    background-color: #007bff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
}

#info{
    margin-top: 15px;
    font-weight: bold;
    color: #333;
}
</style>

</head>

<body>

<h2>Customer</h2>

<div id="chatIcon">Chat</div>

<p id="info"></p>

<script>

document.getElementById("chatIcon").addEventListener("mouseover", function(){

    document.getElementById("info").innerText =
    "Click here to talk with customer support";

    console.log("Mouse hovered over chat icon");

});

</script>

</body>
</html>
