<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Page Load Performance Monitor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:8px;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    text-align:center;
}

h2{
    color:#333;
}

#result{
    margin-top:20px;
    font-size:16px;
    color:green;
}

#log{
    margin-top:20px;
    text-align:left;
    border-top:1px solid #ddd;
    padding-top:10px;
    max-height:180px;
    overflow:auto;
}

.log-item{
    font-size:14px;
    padding:4px 0;
    border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h2>Page Load Performance Monitor</h2>

<p>This page measures how long it takes to fully load.</p>

<div id="result"></div>

<div id="log"></div>

</div>


<script>

const start = performance.now();


const logger = {

log:function(level,message,data){

    const logEntry={
        level:level,
        message:message,
        data:data,
        time:new Date().toLocaleTimeString()
    };

    console.log("Sending Log:",logEntry);

    const logDiv=document.getElementById("log");

    const item=document.createElement("div");
    item.className="log-item";

    item.textContent =
    "["+logEntry.time+"] "+message+" "+data;

    logDiv.prepend(item);

}

};


window.onload=function(){

const end = performance.now();

const loadTime = end - start;

logger.log("INFO","Page Load Time:", loadTime.toFixed(2) + " ms");

document.getElementById("result").innerHTML =
"Page Load Time: " + loadTime.toFixed(2) + " ms";

};

</script>

</body>
</html>
