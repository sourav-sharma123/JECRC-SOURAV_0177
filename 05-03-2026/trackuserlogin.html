<!DOCTYPE html>
<html>
<head>
<title>User Login Tracker</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

h2{
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:10px;
    background:#667eea;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
}

#status{
    margin-top:15px;
    font-size:14px;
    color:green;
}

</style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<input id="username" placeholder="Enter Username">
<button onclick="login()">Login</button>

<p id="status"></p>

</div>

<script>

function login(){

    const user = document.getElementById("username").value;

    if(!user){
        alert("Please enter username");
        return;
    }

    const logData = {
        level:"INFO",
        message:"User Login Attempt",
        username:user,
        timestamp:new Date().toISOString()
    };

    sendLog(logData);
}

function sendLog(data){

    console.log("Sending log to remote server...");
    console.log(data);

    document.getElementById("status").innerText =
    "Log sent for user: " + data.username;

}

</script>

</body>
</html> task 6
