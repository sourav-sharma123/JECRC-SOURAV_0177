<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch Expressions Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2193b0, #6dd5ed);
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            background-color: #343a40;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .card {
            margin-top: 20px;
            padding: 20px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 10px;
            display: inline-block;
        }

        .active {
            border: 2px solid yellow;
        }

        .note {
            margin-top: 25px;
            font-size: 17px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Developer Tools – Watch Expressions</h1>

        <button onclick="runDemo()">Run Debug Demo</button>

        <div class="card active">
            Active Card Element
        </div>

        <div class="note">
        Open F12 → Sources → Add Watch Expressions:<br>
            myVariable<br>
            document.querySelector('.active')<br>
            users.length
        </div>
    </div>

    <script>
        let myVariable = "JECRC University";

        const users = [
            { name: "John", age: 30 },
            { name: "Jane", age: 25 },
            { name: "Alex", age: 28 }
        ];

        function runDemo() {
            debugger; // Pause execution here
            console.log("Debugging Started");
        }
    </script>

</body>
</html>
