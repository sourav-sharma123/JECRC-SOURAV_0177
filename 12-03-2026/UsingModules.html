<!DOCTYPE html>
<html>
<head>
<title>Using Modules</title>

<style>
body{
font-family: Arial;
padding:40px;
}

h2{
margin-top:20px;
}

.container{
display:flex;
gap:40px;
}

.box{
border:1px solid #ccc;
padding:20px;
width:300px;
border-radius:8px;
}

button{
margin-top:10px;
padding:6px 12px;
}

.result{
margin-top:10px;
font-weight:bold;
color:blue;
}
</style>

<script>

// ---------------- BEFORE MODULES ----------------

function formatDate(date)
{
    return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
}

function validateEmail(email)
{
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function checkEmail1()
{
    const email = document.getElementById('email1').value;
    const result = validateEmail(email) ? "Valid Email" : "Invalid Email";
    document.getElementById('result1').innerText = result;
}

// duplicate functions (bad practice)

function formatDate2(date)
{
    return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
}

function validateEmail2(email)
{
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function checkEmail2()
{
    const email = document.getElementById('email2').value;
    const result = validateEmail2(email) ? "Valid Email" : "Invalid Email";
    document.getElementById('result2').innerText = result;
}


// ---------------- AFTER MODULES ----------------
// Creating a reusable utility module

const utils = {

    formatDate(date)
    {
        return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
    },

    validateEmail(email)
    {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

};

function checkEmail3()
{
    const email = document.getElementById('email3').value;
    const result = utils.validateEmail(email) ? "Valid Email" : "Invalid Email";
    document.getElementById('result3').innerText = result;
}

document.getElementById("date4").innerText = utils.formatDate(new Date());

function checkEmail4()
{
    const email = document.getElementById('email4').value;
    const result = utils.validateEmail(email) ? "Valid Email" : "Invalid Email";
    document.getElementById('result4').innerText = result;
}

</script>

</head>

<body>

<h1>Email Validation Example</h1>

<div class="container">

<!-- Module 1 -->
<div class="box">
<h2>Module 1 (Before Modules)</h2>

<input type="text" id="email1" placeholder="Enter Email">
<br>
<button onclick="checkEmail1()">Check Email</button>

<div id="result1" class="result"></div>

</div>


<!-- Module 2 -->
<div class="box">
<h2>Module 2 (Duplicate Functions)</h2>

<input type="text" id="email2" placeholder="Enter Email">
<br>
<button onclick="checkEmail2()">Check Email</button>

<div id="result2" class="result"></div>

</div>


<!-- Module 3 -->
<div class="box">
<h2>Module 3 (Using Module Object)</h2>

<input type="text" id="email3" placeholder="Enter Email">
<br>
<button onclick="checkEmail3()">Check Email</button>

<div id="result3" class="result"></div>

</div>

<!-- Module 4 -->
<div class="box">
<h2>Module 4 (Using Module Object)</h2>

<input type="text" id="email4" placeholder="Enter Email">
<br>
<button onclick="checkEmail4()">Check Email</button>

<div id="result4" class="result"></div>

</div>

</div>

</body>
</html>
