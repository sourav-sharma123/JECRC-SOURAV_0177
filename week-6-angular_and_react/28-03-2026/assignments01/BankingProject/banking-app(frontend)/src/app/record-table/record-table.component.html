<div class="container">

  <!-- 🔍 Filter Section -->
  <div class="filter">
    <input type="date" [(ngModel)]="selectedDate" />
    <button (click)="filterByDate()">Filter</button>
    <button (click)="selectedDate=''; filterByDate()">Reset</button>
  </div>

  <!-- 📊 Table -->
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Type</th>

        <!-- 🔥 Toggle Sort UI -->
        <th (click)="sortByAmount()" class="sortable">
          Amount ($)
          <span *ngIf="isAscending">⬆️</span>
          <span *ngIf="!isAscending">⬇️</span>
        </th>

        <th>Balance</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let t of filteredTransactions">
        <td>{{ t.date | date:'yyyy-MM-dd' }}</td>
        <td>{{ t.description }}</td>
        <td>{{ t.type === 0 ? 'Credit' : 'Debit' }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.balance }}</td>
      </tr>
    </tbody>
  </table>

</div>
